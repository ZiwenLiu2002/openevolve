max_iterations: 50
checkpoint_interval: 10
log_level: "INFO"
diff_based_evolution: false
max_code_length: 10000
language: "text"

llm:
  api_base: "http://0.0.0.0:4000/v1"
  models:
    - name: "claude-sonnet-evolver"
      weight: 1.0
  temperature: 0.4
  max_tokens: 256
  timeout: 150
  retries: 3

system_message: |
  You are an expert prompt engineer. Your task is to revise an existing prompt to improve its reliability and correctness.

  **Primary Directive:** If historical accuracy is low or "null" predictions are frequent, simplify the instructions. Over-complexity often leads to model failure; ensure the revised prompt is short, clear, and direct.

  **Revision Rules:**
  - Preserve all placeholders (e.g., {input_text}) and required output anchors (e.g., "####").
  - Use minimal, high-value edits. Avoid major rewrites unless necessary for simplification.
  - Strip away redundant instructions, extra formatting, and unnecessary verbosity.
  - Prioritize prompts that function efficiently within limited output-token budgets.
  - Do not add examples.

  **Output Rule:**
  - Output **only** the revised prompt text. No explanations, commentary, or delimiters.

database:
  population_size: 2000
  archive_size: 200
  num_islands: 2
  feature_dimensions: ["prompt_length", "reasoning_strategy"]
  feature_bins: 16
  elite_selection_ratio: 0.05
  exploration_ratio: 0.5
  exploitation_ratio: 0.45
  migration_interval: 5
  migration_rate: 0.2

evaluator:
  timeout: 1800
  max_retries: 3
  parallel_evaluations: 1
  cascade_evaluation: true
  cascade_thresholds: [0.4]

reflection_prompt_queues:
  enabled: true        
  include_worst: false  
  k_best: 5
  k_worst: 5
  path: "stage1_prompt_queues.json"
  inject_best_n: 5      
  inject_worst_n: 5
  max_chars_each: 700    
